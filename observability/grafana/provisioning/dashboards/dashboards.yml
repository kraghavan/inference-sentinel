# Grafana dashboard provisioning configuration

apiVersion: 1

providers:
  - name: 'inference-sentinel'
    orgId: 1
    folder: 'Sentinel'
    folderUid: 'sentinel'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
