# Prometheus configuration for inference-sentinel

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'inference-sentinel'

# Alertmanager configuration (optional, for future use)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files (for future alerting rules)
# rule_files:
#   - "alerts/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # inference-sentinel metrics
  - job_name: 'sentinel'
    static_configs:
      - targets: ['sentinel:8000']
    metrics_path: /metrics
    scrape_interval: 5s

  # Ollama metrics (if available)
  # Ollama doesn't expose Prometheus metrics by default,
  # but we track inference metrics through sentinel
  
  # Grafana metrics
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics

  # Loki metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
    metrics_path: /metrics

  # Tempo metrics
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
    metrics_path: /metrics
