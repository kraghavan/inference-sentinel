services:
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config:ro
    environment:
      - SENTINEL_ENV=development
      - SENTINEL_DEBUG=true
      - PYTHONPATH=/app/src
      - SENTINEL_HOST=0.0.0.0
      - SENTINEL_PORT=8000
      # Shadow mode
      - SENTINEL_SHADOW__ENABLED=true
      - SENTINEL_SHADOW__SAMPLE_RATE=1.0
      # Controller
      - SENTINEL_CONTROLLER__ENABLED=true
      # Cloud backends
      - SENTINEL_CLOUD__GOOGLE_MODEL=gemini-2.0-flash
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      # Local backends (native Ollama on Mac)
      - 'SENTINEL_LOCAL__ENDPOINTS=[{"name": "gemma", "host": "host.docker.internal", "port": 11434, "model": "gemma3:4b", "priority": 1, "enabled": true}, {"name": "mistral", "host": "host.docker.internal", "port": 11434, "model": "mistral", "priority": 2, "enabled": true}]'
      - SENTINEL_LOCAL__SELECTION_STRATEGY=round_robin
      # Telemetry
      - SENTINEL_TELEMETRY__OTLP_ENDPOINT=http://tempo:4317
      - SENTINEL_TELEMETRY__SERVICE_NAME=inference-sentinel
      - SENTINEL_TELEMETRY__LOG_LEVEL=INFO
      - SENTINEL_NER__ENABLED=true
      - SENTINEL_NER__MODEL=fast
      - SENTINEL_NER__DEVICE=cpu
    depends_on:
      prometheus:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sentinel-network

  prometheus:
    image: prom/prometheus:v2.50.0
    ports:
      - "9091:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  tempo:
    image: grafana/tempo:2.3.0
    ports:
      - "4317:4317"
      - "4318:4318"
      - "3200:3200"
    volumes:
      - ./observability/tempo/tempo-config.yml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    networks:
      - sentinel-network

  grafana:
    image: grafana/grafana:10.3.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=sentinel
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  sentinel-network:
    driver: bridge

volumes:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data: