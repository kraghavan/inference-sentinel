# Secret for cloud API keys
# Usage: kubectl create secret generic sentinel-secrets \
#   --from-literal=ANTHROPIC_API_KEY=sk-ant-xxx \
#   --from-literal=GOOGLE_API_KEY=xxx \
#   -n inference-sentinel
#
# Or apply this file after base64 encoding your keys:
#   echo -n 'your-api-key' | base64
---
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-secrets
  namespace: inference-sentinel
  labels:
    app.kubernetes.io/name: inference-sentinel
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # Replace with base64-encoded values:
  # echo -n 'sk-ant-xxxx' | base64
  ANTHROPIC_API_KEY: ""
  # echo -n 'your-google-api-key' | base64
  GOOGLE_API_KEY: ""
