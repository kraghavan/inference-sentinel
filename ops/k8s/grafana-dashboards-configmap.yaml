# Grafana dashboard provisioning ConfigMap
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: inference-sentinel
  labels:
    app.kubernetes.io/name: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'inference-sentinel'
        orgId: 1
        folder: 'Sentinel'
        folderUid: 'sentinel'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
# Note: grafana-dashboards ConfigMap is created by deploy.sh from JSON files
