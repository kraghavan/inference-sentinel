# inference-sentinel configuration
# This file can be used as an alternative to environment variables

# Environment
env: development
debug: true

# Server settings
host: "0.0.0.0"
port: 8000

# Local inference backends
local:
  endpoints:
    # Mac Mini - primary endpoint
    - name: mac-mini
      host: localhost  # Use "ollama" when running in Docker, "localhost" when native
      port: 11434
      model: "gemma3:4b"
      priority: 1
      enabled: true

    # MacBook - secondary endpoint (update IP when running)
    # - name: macbook
    #   host: 192.168.1.20
    #   port: 11434
    #   model: "gemma3:4b"
    #   priority: 2
    #   enabled: true

  selection_strategy: priority  # priority | round_robin | latency_best
  health_check_interval_seconds: 30
  failover_enabled: true
  timeout_seconds: 120

# Cloud backends (Phase 2)
cloud:
  primary: anthropic
  fallback: google
  anthropic_model: "claude-sonnet-4-20250514"
  google_model: "gemini-1.5-flash"
  timeout_seconds: 60
  # API keys should be set via environment variables:
  # SENTINEL_CLOUD__ANTHROPIC_API_KEY
  # SENTINEL_CLOUD__GOOGLE_API_KEY

# Telemetry settings
telemetry:
  enabled: true
  otlp_endpoint: "http://localhost:4317"
  service_name: "inference-sentinel"
  log_level: INFO
  metrics_port: 9090
