name: CI

on:
  push:
    branches: [main, KRAG-1]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: ""
          GOOGLE_API_KEY: ""

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --cov=src/sentinel --cov-report=xml --cov-report=term-missing
        env:
          ANTHROPIC_API_KEY: ""
          GOOGLE_API_KEY: ""

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  test-optional-deps:
    name: Test with optional dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (with cloud)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cloud]"

      - name: Run tests
        run: |
          pytest tests/unit/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: ""
          GOOGLE_API_KEY: ""

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
